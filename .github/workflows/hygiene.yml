name: hygiene

on:
  push:
    branches: [main]
  pull_request:

jobs:
  forked-skills-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Forked skills layout lint
        run: scripts/test-forked-skills-layout.sh
